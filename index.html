<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Weekly Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h1>Weekly Strategy & Achievements</h1>
        <div class="controls">
            <button onclick="changeWeek(-1)">◀ Prev</button>
            <input type="week" id="weekPicker" onchange="loadSelectedWeek()">
            <button onclick="changeWeek(1)">Next ▶</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="weekly-goals">
            <h3>Week's Master Goals</h3>
            <p>Elinize sağlık.</p>
            <p>Organize your thoughts here first:</p>
            <textarea id="masterWeeklyGoals" oninput="saveMasterGoals()" placeholder="1. Finish Python project..."></textarea>
        </aside>

        <main id="planner-grid" class="planner-grid">
            </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
